{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<!-- ========== Page Header ========== -->
<div class="page-header">
  <h1>Student Registration</h1>
  <p>Register your profile image for identity verification before examination access.</p>
</div>

<div class="glass-card" style="max-width:640px; margin:0 auto;">

  <!-- ========== Student Information Form ========== -->
  <div class="form-group">
    <label for="studentId">Student ID <span style="color:var(--danger)">*</span></label>
    <input type="text" class="form-control" id="studentId"
           placeholder="e.g. STU-2025-001" maxlength="20" autocomplete="off" />
  </div>
  <div class="form-group">
    <label for="studentName">Full Name <span style="color:var(--danger)">*</span></label>
    <input type="text" class="form-control" id="studentName"
           placeholder="e.g. John Doe" maxlength="100" />
  </div>
  <div class="form-group">
    <label for="studentEmail">Email <span style="color:var(--text-muted)">(optional)</span></label>
    <input type="email" class="form-control" id="studentEmail"
           placeholder="john@university.edu" maxlength="100" />
  </div>

  <!-- Divider between form and camera section -->
  <div class="divider"></div>

  <!-- ========== Webcam Section (hidden until camera started) ========== -->
  <div id="cameraSection" style="display:none;">
    <div class="webcam-area" id="webcamArea">
      <!-- Live webcam preview (mirrored via CSS) -->
      <video id="videoPreview" autoplay playsinline muted></video>
      <!-- Hidden canvas used solely to capture frames -->
      <canvas id="captureCanvas"></canvas>
      <!-- Overlay: dashed oval face guide -->
      <div class="webcam-overlay">
        <div class="face-guide"></div>
      </div>
      <!-- Horizontal scan-line animation (activated during capture) -->
      <div class="scan-line" id="scanLine"></div>
    </div>

    <!-- Capture progress dots (1 dot per sample) -->
    <div class="capture-progress" id="captureProgress"></div>
    <div class="status-bar show info mt-2" id="poseHintBar" style="display:none;"></div>
  </div>

  <!-- ========== Status / Feedback Messages ========== -->
  <div class="status-bar" id="statusBar"></div>

  <!-- ========== Action Buttons ========== -->
  <div class="gap-row mt-2">
    <!-- Step 1: Start the webcam -->
    <button class="btn btn-primary btn-block" id="btnStartCamera" onclick="startCamera()">
      Start Camera
    </button>

    <!-- Step 2: Capture 5 face samples (hidden until camera is live) -->
    <button class="btn btn-success btn-block" id="btnCaptureSamples"
            onclick="captureFaceSamples()" style="display:none;">
      Capture Face Samples
    </button>
  </div>

  <!-- Step 3: Submit to backend (hidden until all samples captured) -->
  <button class="btn btn-primary btn-block mt-3" id="btnSubmit"
          onclick="submitRegistration()" style="display:none;">
    Complete Registration
  </button>

</div>
{% endblock %}

{% block scripts %}
<script>
  const CAPTURE_SEQUENCE = [
    { pose: 'center', label: 'Look straight at the camera' },
    { pose: 'left',   label: 'Turn your head LEFT' },
    { pose: 'right',  label: 'Turn your head RIGHT' },
  ];

  const TOTAL_CAPTURES = CAPTURE_SEQUENCE.length;
  const STEP_TIMEOUT_MS = 12000;
  const STEP_POLL_MS = 450;

  let capturedImages = [];
  let cameraStream = null;
  let leftStepSign = '';

  async function startCamera() {
    const sid  = document.getElementById('studentId').value.trim();
    const name = document.getElementById('studentName').value.trim();

    if (!sid) {
      return showStatus('Please enter your Student ID.', 'error');
    }
    if (!name) {
      return showStatus('Please enter your full name.', 'error');
    }

    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: 'user' }
      });

      document.getElementById('videoPreview').srcObject = cameraStream;
      document.getElementById('cameraSection').style.display = 'block';

      const dotsHtml = Array.from({ length: TOTAL_CAPTURES }, (_, i) =>
        `<div class="capture-dot" id="dot-${i}"></div>`
      ).join('');
      document.getElementById('captureProgress').innerHTML = dotsHtml;

      document.getElementById('btnStartCamera').style.display = 'none';
      document.getElementById('btnCaptureSamples').style.display = 'flex';

      document.getElementById('studentId').readOnly = true;
      document.getElementById('studentName').readOnly = true;
      document.getElementById('studentEmail').readOnly = true;

      setPoseHint('Follow the posture instruction shown here for each capture.', 'info');

      showStatus(
        'Camera ready. You will be guided through 3 poses: straight, left, right.',
        'info'
      );

    } catch (err) {
      console.error('Camera error:', err);
      showStatus(
        'Could not access the camera. Please allow camera permissions and try again.',
        'error'
      );
    }
  }

  async function captureFaceSamples() {
    const btn = document.getElementById('btnCaptureSamples');
    btn.disabled = true;
    capturedImages = [];
    leftStepSign = '';

    for (let i = 0; i < TOTAL_CAPTURES; i++) {
      document.getElementById(`dot-${i}`).classList.remove('captured');
    }

    document.getElementById('scanLine').classList.add('active');

    for (let i = 0; i < CAPTURE_SEQUENCE.length; i++) {
      const step = CAPTURE_SEQUENCE[i];
      const ok = await captureSingleStep(i, step);
      if (!ok) {
        document.getElementById('scanLine').classList.remove('active');
        btn.disabled = false;
        showStatus('Capture timed out. Please restart and follow the posture instructions.', 'warning');
        return;
      }
    }

    document.getElementById('scanLine').classList.remove('active');

    if (capturedImages.length === TOTAL_CAPTURES) {
      showStatus(
        `${capturedImages.length} posture-guided face samples captured. Click "Complete Registration".`,
        'success'
      );
      setPoseHint('All posture steps completed successfully.', 'success');
      document.getElementById('btnCaptureSamples').style.display = 'none';
      document.getElementById('btnSubmit').style.display = 'flex';
    } else {
      showStatus('Could not capture all required poses. Please try again.', 'error');
      btn.disabled = false;
    }
  }

  async function captureSingleStep(index, step) {
    const stepText = `Step ${index + 1}/${TOTAL_CAPTURES}: ${step.label}`;
    setPoseHint(stepText, 'info');
    showStatus(`${stepText}. Keep your face inside the oval.`, 'info');

    const referenceSign = step.pose === 'right' ? leftStepSign : '';
    const poseReady = await waitForExpectedPose(step.pose, STEP_TIMEOUT_MS, referenceSign);
    if (!poseReady) {
      showStatus(`Warning: wrong posture for step ${index + 1}. ${step.label}.`, 'warning');
      setPoseHint(`Warning: ${step.label}`, 'warning');
      return false;
    }

    await sleep(250);
    const frameData = captureCurrentFrame();
    if (!frameData) {
      showStatus('Capture failed. Please keep your camera active and retry.', 'error');
      return false;
    }

    const validation = await registrationPoseCheck(frameData, step.pose, referenceSign);
    if (!validation.success) {
      showStatus(`Warning: ${validation.message}`, 'warning');
      setPoseHint(`Warning: ${step.label}`, 'warning');
      return false;
    }

    if (step.pose === 'left' && validation.turn_sign) {
      leftStepSign = validation.turn_sign;
    }

    capturedImages.push(frameData);
    document.getElementById(`dot-${index}`).classList.add('captured');
    showStatus(`Captured step ${index + 1}: ${step.label}.`, 'success');
    return true;
  }

  function captureCurrentFrame() {
    const video  = document.getElementById('videoPreview');
    const canvas = document.getElementById('captureCanvas');

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    if (!canvas.width || !canvas.height) {
      return null;
    }

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.9);
  }

  async function submitRegistration() {
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing faces...';

    const payload = {
      student_id:   document.getElementById('studentId').value.trim(),
      student_name: document.getElementById('studentName').value.trim(),
      email:        document.getElementById('studentEmail').value.trim(),
      images:       capturedImages,
    };

    try {
      const response = await fetch('/api/register-face', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const result = await response.json();

      if (result.success) {
        showStatus(result.message, 'success');
        btn.style.display = 'none';
        stopCamera();
        setTimeout(() => {
          window.location.href = '/login';
        }, 2500);

      } else {
        showStatus(result.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Complete Registration';
      }

    } catch (networkErr) {
      console.error('Submit error:', networkErr);
      showStatus('Network error. Please check your connection and try again.', 'error');
      btn.disabled = false;
      btn.innerHTML = 'Complete Registration';
    }
  }

  function stopCamera() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(track => track.stop());
      cameraStream = null;
    }
    const hint = document.getElementById('poseHintBar');
    hint.style.display = 'none';
  }

  async function registrationPoseCheck(imageBase64, expectedPose, referenceSign = '') {
    try {
      const response = await fetch('/api/register-pose-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: imageBase64,
          expected_pose: expectedPose,
          reference_sign: referenceSign,
        }),
      });
      return await response.json();
    } catch (err) {
      return { success: false, message: 'Unable to check posture. Keep your face steady and retry.' };
    }
  }

  async function waitForExpectedPose(expectedPose, timeoutMs, referenceSign = '') {
    const start = Date.now();
    let stableFrames = 0;

    while (cameraStream) {
      if (Date.now() - start > timeoutMs) {
        return false;
      }

      const frame = captureCurrentFrame();
      if (!frame) {
        await sleep(250);
        continue;
      }

      const result = await registrationPoseCheck(frame, expectedPose, referenceSign);
      if (result.success) {
        stableFrames += 1;
        if (expectedPose === 'left' && result.turn_sign) {
          leftStepSign = result.turn_sign;
        }
        if (stableFrames >= 2) {
          showStatus('Posture accepted. Hold still for capture...', 'success');
          return true;
        }
      } else {
        stableFrames = 0;
        showStatus(`Warning: ${result.message || 'Adjust your posture.'}`, 'warning');
      }

      await sleep(STEP_POLL_MS);
    }

    showStatus('Camera is not active. Please start the camera again.', 'error');
    return false;
  }

  function setPoseHint(message, type = 'info') {
    const hint = document.getElementById('poseHintBar');
    hint.style.display = 'block';
    hint.className = `status-bar show ${type} mt-2`;
    hint.textContent = `Posture guide: ${message}`;
  }
</script>
{% endblock %}
